# GPS/Location Tracker - Docker Compose Configuration
#
# Usage:
#   Development: docker compose up -d
#   Production:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Configuration:
#   1. Copy .env.example to .env
#   2. Edit .env with your settings
#   3. Run docker compose up -d

version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: gps-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tracker}
      POSTGRES_USER: ${POSTGRES_USER:-tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tracker_secret}
    volumes:
      - tracker-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - tracker-internal

  tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gps-tracker
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${TRACKER_PORT:-8080}:80"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=${POSTGRES_DB:-tracker}
      - DB_USER=${POSTGRES_USER:-tracker}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-tracker_secret}
      - LOG_FILE=/var/log/tracker/fetch.log
    volumes:
      # .env file - all configuration is read from here (writable for settings UI)
      - ./.env:/var/www/html/.env
      # Logs
      - tracker-logs:/var/log/tracker

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api.php?action=health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    networks:
      - tracker-internal
      - tracker-network
      - bagron-network

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  tracker-pgdata:
    name: gps-tracker-pgdata
  tracker-logs:
    name: gps-tracker-logs

networks:
  tracker-internal:
    name: gps-tracker-internal
    driver: bridge
  tracker-network:
    name: gps-tracker-network
    driver: bridge
  bagron-network:
    external: true
    name: bagron-network
