[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:apache2]
command=/usr/sbin/apache2ctl -D FOREGROUND
autostart=true
autorestart=true
startretries=3
stderr_logfile=/var/log/supervisor/apache2-error.log
stdout_logfile=/var/log/supervisor/apache2-output.log
priority=10

[program:fetch]
command=/bin/bash /var/www/html/docker/fetch-loop.sh
user=www-data
autostart=true
autorestart=true
startretries=3
startsecs=5
stderr_logfile=/var/log/supervisor/fetch-error.log
stdout_logfile=/var/log/supervisor/fetch-output.log
priority=30

[program:smart-refetch]
command=/bin/bash /var/www/html/docker/smart-refetch-loop.sh
user=www-data
autostart=true
autorestart=true
startretries=3
startsecs=5
stderr_logfile=/var/log/supervisor/smart-refetch-error.log
stdout_logfile=/var/log/supervisor/smart-refetch-output.log
priority=40
